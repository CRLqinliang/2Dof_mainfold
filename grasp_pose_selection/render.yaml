# 手动 Web Service：Root Directory 设为 grasp_pose_selection。
# Blueprint：优先用仓库根目录的 render.yaml（内容一致，便于发现）。
services:
  - type: web
    name: grasp-pose-api
    runtime: python
    rootDir: grasp_pose_selection
    buildCommand: pip install -r requirements.txt
    startCommand: RENDER=1 python web/server.py
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
